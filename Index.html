<script>

var _simulatedUserEmail = "<?= simulatedUserEmail ?>";

function _isInjected(val) { return val && val.indexOf('@') !== -1 && val.indexOf('<?') === -1; }

// Pendaftaran global untuk Datalabels

// Fungsi Notifikasi Toast
function showNotification(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    if(!container) return;
    const toast = document.createElement('div');
    toast.style.background = '#1e293b';
    toast.style.color = 'white';
    toast.style.padding = '12px 20px';
    toast.style.borderRadius = '12px';
    toast.style.marginBottom = '10px';
    toast.style.fontSize = '14px';
    toast.style.boxShadow = '0 10px 15px -3px rgba(0,0,0,0.1)';
    toast.innerHTML = `<span>${type === 'success' ? '✅' : (type === 'error' ? '❌' : 'ℹ️')}</span> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 4000);
}

// Tutup modal menggunakan kekunci Escape
window.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' || event.keyCode === 27) {
        const modals = document.querySelectorAll('.modal');
        modals.forEach(modal => {
            if (modal.style.display === 'flex' || modal.style.display === 'block') {
                modal.style.display = 'none';
            }
        });
    }
});

// Verifikasi Identiti Pengguna dari Google Apps Script
function checkGoogleIdentity() {
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(function(result) {
                if (result.success) {
                    userRole = result.role;
                    userEmail = result.email;
                    render();
                    if (userRole === 'admin') {
                        showNotification('Akses Pentadbir disahkan (' + userEmail + ').', 'success');
                    } else {
                        showNotification('Akses Hanya Baca disahkan (' + userEmail + ').', 'info');
                    }
                }
            })
            .withFailureHandler(function(err) {
                showNotification('Gagal membuat verifikasi Google SSO.', 'error');
            })
            .verifyUserAccess();
    } else {
        // Fallback jika dibuka selain dari persekitaran Apps Script
        userRole = 'admin';
        userEmail = _isInjected(_simulatedUserEmail) ? _simulatedUserEmail : 'pengguna@contoh.com';
        showNotification('Akses disimulasikan (Local Preview).', 'success');
        render();
    }
}

// Semak Kebenaran Admin Sebelum Membuka Fungsi Sensitif
window.requireAdmin = (actionFunction) => {
    if (userRole === 'admin') {
        if (actionFunction) actionFunction();
    } else {
        showNotification('Tindakan ini memerlukan kebenaran Akses Pentadbir.', 'error');
    }
};

// Tarik Maklumat dari Spreadsheet RMC
async function fetchDataFromSheet() {
    isLoadingData = true; 
    statusMessage = "Sedang menyegerak data dari spreadsheet...";
    render(); 
    
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(function(data) {
                students = data || [];
                lastUpdated = new Date();
                showNotification('Data berjaya disegerak dari spreadsheet.', 'success');
                isLoadingData = false; 
                render();
            })
            .withFailureHandler(function(err) {
                showNotification('Gagal mengambil data: ' + err.message, 'error');
                isLoadingData = false; 
                render();
            })
            .getStudentsData();
    } else {
        setTimeout(() => {
            loadMockData();
            isLoadingData = false;
            render();
        }, 1000);
    }
}

// Proses Penjanaan Sijil (Ujian & Sebenar) Menggunakan SweetAlert2
function triggerCertificateProcess(mode, selectedMatrics = []) {
    const isTest = mode === 'test';
    
    if (document.getElementById('confirmModal')) {
        document.getElementById('confirmModal').style.display = 'none';
    }
    
    Swal.fire({
        title: isTest ? 'Sedang Menjana Sijil (Ujian)...' : 'Sedang Menjana Sijil Sebenar...',
        text: 'Proses ini mungkin mengambil sedikit masa. Sila tunggu dan jangan tutup tetingkap ini.',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
    
    if (typeof google !== 'undefined' && google.script) {
        const withSuccess = function(response) {
            Swal.fire({
                icon: 'success',
                title: 'Selesai!',
                text: `Berjaya dihantar: ${response.success} | Ralat: ${response.error}`
            });
            fetchDataFromSheet();
        };
        const withFailure = function(err) {
            Swal.fire({
                icon: 'error',
                title: 'Ralat Berlaku',
                text: err.message || 'Sistem gagal menghubungi pelayan.'
            });
        };
        
        if (isTest) {
            google.script.run.withSuccessHandler(withSuccess).withFailureHandler(withFailure).runTestModeWeb();
        } else {
            google.script.run.withSuccessHandler(withSuccess).withFailureHandler(withFailure).runActualModeWeb(selectedMatrics);
        }
    } else {
         setTimeout(() => {
             Swal.fire({
                icon: 'success',
                title: 'Simulasi Selesai!',
                text: `[Mod ${mode.toUpperCase()}] Sijil berjaya diproses (Local Preview).`
             });
             render();
         }, 2000);
    }
}

// URUS ADMIN
window.openAdminModal = () => {
    document.getElementById('adminModal').style.display = 'flex';
    document.getElementById('adminListArea').innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin text-blue-600"></i> Memuat turun senarai admin...</div>';

window.renderAdminListHtml = () => {
    let html = '';
    adminList.forEach(email => {
        html += `
        <div class="admin-list-item">
            <span style="font-weight:600; color:#1e293b;">${escapeHtml(email)}</span>
            <button class="btn btn-danger" style="padding: 5px 10px; font-size:11px;" onclick="removeAdminAction('${escapeHtml(email)}')"><i class="fa-solid fa-trash" style="margin-right: 5px;"></i> Buang</button>
        </div>`;
    });
    document.getElementById('adminListArea').innerHTML = html;
};

window.addAdminAction = () => {
    const newEmail = document.getElementById('newAdminEmail').value.trim();
    if (!newEmail) return;
    
    document.getElementById('adminListArea').innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin text-blue-600"></i> Menambah admin...</div>';
    
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(function(list) {
                adminList = list;
                document.getElementById('newAdminEmail').value = '';
                renderAdminListHtml();
                showNotification('Pentadbir baharu berjaya ditambah.', 'success');
            })
            .withFailureHandler(function(err) {
                showNotification(err.message, 'error');
                renderAdminListHtml();
            })
            .addAdminWeb(newEmail);
    } else {
        adminList.push(newEmail);
        document.getElementById('newAdminEmail').value = '';
        renderAdminListHtml();
    }
};

window.removeAdminAction = (email) => {
    if(!confirm(`Adakah anda pasti mahu membuang ${email} dari senarai pentadbir?`)) return;
    
    document.getElementById('adminListArea').innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin text-blue-600"></i> Membuang admin...</div>';
    
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(function(list) {
                adminList = list;
                renderAdminListHtml();
                showNotification('Pentadbir berjaya dibuang.', 'success');
            })
            .withFailureHandler(function(err) {
                showNotification(err.message, 'error');
                renderAdminListHtml();
            })
            .removeAdminWeb(email);
    } else {
        adminList = adminList.filter(e => e !== email);
        renderAdminListHtml();
    }
};

        nama: document.getElementById('editNama').value,
        emel: document.getElementById('editEmel').value,
        certId: document.getElementById('editCertId').value,
        rmcSession: document.getElementById('editRmcSession').value,
        faculty: document.getElementById('editFaculty').value,
        status: document.getElementById('editStatus').value
    };

    document.getElementById('editModalBtns').classList.add('hidden');
    document.getElementById('editModalLoading').style.display = 'block';

    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler(function(result) {
                showNotification('Rekod berjaya dikemaskini dalam spreadsheet.', 'success');
                students[studentIndex] = Object.assign(students[studentIndex], updatedData);
                document.getElementById('editModal').style.display = 'none';
                render();
            })
            .withFailureHandler(function(err) {
                showNotification('Ralat sistem: ' + err.message, 'error');
                document.getElementById('editModalBtns').classList.remove('hidden');
                document.getElementById('editModalLoading').style.display = 'none';
            })
            .updateStudentWeb(updatedData);
    } else {
        setTimeout(() => {
            students[studentIndex] = Object.assign(students[studentIndex], updatedData);
            document.getElementById('editModal').style.display = 'none';
            showNotification('Rekod berjaya dikemaskini (Simulasi).', 'success');
            render();
        }, 1000);
    }
};

function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function getStatusCategory(statusStr) {
    if(!statusStr) return 'Pending';
    const s = statusStr.toLowerCase();
    if(s === 'emailed') return 'Emailed';
    if(s === 'test emailed') return 'Emel Ujian';
    if(s.includes('error')) return 'Error';
    return 'Pending';
}

function getStatusBadgeHtml(cat, tooltip = '') {
    if(cat === 'Emailed') return `<span class="badge badge-emailed"><i class="fa-solid fa-check" style="margin-right:4px;"></i> Selesai Emel</span>`;
    if(cat === 'Emel Ujian') return `<span class="badge badge-test"><i class="fa-solid fa-vial" style="margin-right:4px;"></i> Emel Ujian</span>`;
    if(cat === 'Error') return `<span class="badge badge-error" title="${escapeHtml(tooltip)}"><i class="fa-solid fa-circle-exclamation" style="margin-right:4px;"></i> Ralat</span>`;
    return `<span class="badge badge-pending">Belum Diemel</span>`;
}

// MELUKIS CARTA (CHARTS)
function renderCharts() {
    if(!students || students.length === 0) return;

    const statusCounts = { 'Selesai Emel': 0, 'Emel Ujian': 0, 'Belum Diemel': 0, 'Ralat': 0 };
    students.forEach(s => {
        const cat = getStatusCategory(s.status);
        if (cat === 'Emailed') statusCounts['Selesai Emel']++;
        else if (cat === 'Emel Ujian') statusCounts['Emel Ujian']++;
        else if (cat === 'Error') statusCounts['Ralat']++;
        else statusCounts['Belum Diemel']++;
    });

    const ctxStatus = document.getElementById('statusChart')?.getContext('2d');
    if (ctxStatus) {
        if (charts.status) charts.status.destroy();
        charts.status = new Chart(ctxStatus, {
            type: 'doughnut',
            data: { 
                labels: Object.keys(statusCounts), 
                datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#22c55e', '#eab308', '#cbd5e1', '#ef4444'], borderWeight: 0 }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, cutout: '65%', 
                plugins: { legend: { position: 'bottom' }, datalabels: { color: '#fff', font: { weight: 'bold', size: 14 }, formatter: (value) => value > 0 ? value : '' } } 
            }
        });
    }
}

// FUNGSI SORT TABLE (MENGISIH JADUAL)
window.handleSort = (column) => {
    if (sortColumn === column) {
        sortAscending = !sortAscending; 
    } else {
        sortColumn = column;
        sortAscending = true; 
    }
    render();
};

function getSortIconHtml(column) {
    if (sortColumn !== column) {
        return '<i class="fa-solid fa-sort sort-icon"></i>';
    }
    return sortAscending 
        ? '<i class="fa-solid fa-sort-up sort-icon active"></i>' 
        : '<i class="fa-solid fa-sort-down sort-icon active"></i>';
}

        row.style.display = (matric.includes(input) || name.includes(input)) ? '' : 'none';
    });
    document.getElementById('selectAllCb').checked = false;
};

window.openSelectStudentsModal = () => {
    const listContainer = document.getElementById('studentSelectList');
    listContainer.innerHTML = '';
    const searchInput = document.getElementById('modalSearchInput');
    if (searchInput) searchInput.value = '';
    
    const pendingStudents = students.filter(s => {
        return !(s.no||'').toLowerCase().startsWith('test') && (s.status||'').trim().toLowerCase() !== 'emailed';
    });

    if(pendingStudents.length === 0) {
        listContainer.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">🎉 Semua pelajar sedia ada telah menerima sijil.</td></tr>';
    } else {
        pendingStudents.forEach(s => {
            listContainer.innerHTML += `
                <tr style="border-bottom: 1px solid #f3f4f6; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#f8fafc'" onmouseout="this.style.backgroundColor='transparent'">
                    <td style="padding:10px; text-align:center;"><input type="checkbox" class="student-cb" value="${escapeHtml(s.matric)}" onchange="updateSelectedCount()"></td>
                    <td style="padding:10px; font-family:monospace; color:#64748b;">${escapeHtml(s.matric)}</td>
                    <td style="padding:10px; font-weight:600; color:#1e293b;">${escapeHtml(s.nama)}</td>
                    <td style="padding:10px;">${getStatusBadgeHtml(getStatusCategory(s.status), s.status)}</td>
                </tr>
            `;
        });
    }
    document.getElementById('selectAllCb').checked = false;
    updateSelectedCount();
    document.getElementById('selectStudentsModal').style.display = 'flex';
};

window.toggleSelectAll = () => {
    const selectAll = document.getElementById('selectAllCb').checked;
    const cbs = document.querySelectorAll('.student-cb:not(#selectAllCb)');
    cbs.forEach(cb => {
        const row = cb.closest('tr');
        if (row && row.style.display !== 'none') cb.checked = selectAll;
    });
    updateSelectedCount();
};

window.updateSelectedCount = () => {
    const count = document.querySelectorAll('.student-cb:not(#selectAllCb):checked').length;
    document.getElementById('selectedCountText').innerText = `${count} pelajar dipilih`;
};

window.triggerActualProcess = () => {
    const selectedMatrics = Array.from(document.querySelectorAll('.student-cb:not(#selectAllCb):checked')).map(cb => cb.value);
    if (selectedMatrics.length === 0) {
        showNotification('Sila pilih sekurang-kurangnya seorang pelajar.', 'error');
        return;
    }
    document.getElementById('selectStudentsModal').style.display = 'none';
    triggerCertificateProcess('actual', selectedMatrics);
};

window.openConfirmModal = (mode) => {
    if (mode === 'test') {
        document.getElementById('confirmModal').style.display = 'flex';
        const title = document.getElementById('confirmTitle');
        const desc = document.getElementById('confirmDesc');
        const btn = document.getElementById('confirmBtnAction');
        title.innerHTML = '🧪 Laksana "Mod Ujian" ?';
        desc.innerText = 'Memproses baris "Test" sahaja.';
        btn.className = 'btn btn-warning';
        btn.onclick = () => triggerCertificateProcess('test');
    }
};

window.downloadPDF = () => {
    const element = document.querySelector('.dashboard');
    const actions = document.querySelector('.header-actions');
    const tableActions = document.querySelectorAll('td:last-child, th:last-child');
    actions.style.display = 'none';
    tableActions.forEach(el => el.style.display = 'none');
    
    html2pdf().set({
        margin: [0.3, 0.3], filename: `Laporan_Kursus_RM_${new Date().getTime()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }
    }).from(element).save().then(() => {
        actions.style.display = 'flex';
        tableActions.forEach(el => el.style.display = '');
        showNotification('Laporan PDF berjaya dimuat turun.', 'success');
    });
};

// --- PEMAPAR PDF ---
window.openPdfModal = (matric) => {
    const modal = document.getElementById('pdfModal');
    const iframe = document.getElementById('pdfIframe');
    const loading = document.getElementById('pdfLoadingState');
    const fileName = document.getElementById('pdfFileNameDisplay');
    const openTabBtn = document.getElementById('pdfOpenTab');
    const downloadBtn = document.getElementById('pdfDownload');
    
    const safeMatric = matric.toString().replace(/[^a-zA-Z0-9]/g, '');
    
    fileName.innerText = safeMatric + ".pdf";
    modal.style.display = 'flex';
    loading.style.display = 'flex';
    iframe.style.display = 'none';
    
    loading.innerHTML = `
        <div class="sync-spinner" style="width: 40px; height: 40px; border-width: 4px; margin-bottom: 15px;"></div>
        <p style="font-size: 14px; font-weight: 500;">Menarik dokumen dari Google Drive...</p>
    `;
    
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
            .withSuccessHandler((fileId) => {
                if (fileId) {
                    const previewUrl = `https://drive.google.com/file/d/${fileId}/preview`;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                    const fullViewUrl = `https://drive.google.com/file/d/${fileId}/view`;
                    
                    iframe.src = previewUrl;
                    openTabBtn.href = fullViewUrl;
                    downloadBtn.href = downloadUrl;
                    
                    iframe.onload = () => {
                        loading.style.display = 'none';
                        iframe.style.display = 'block';
                    };
                } else {
                    loading.innerHTML = `
                        <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: #f28b82; margin-bottom: 15px;"></i>
                        <p style="color: #f28b82; font-weight: 600;">Fail tidak dijumpai!</p>
                        <p style="font-size: 12px; margin-top: 5px;">Sijil untuk matrik <b>${safeMatric}</b> belum dijana atau tiada di dalam folder.</p>
                        <button class="btn btn-secondary" style="margin-top: 20px;" onclick="closePdfModal()">Tutup</button>
                    `;
                }
            })
            .withFailureHandler((err) => {
                loading.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation" style="font-size: 48px; color: #f28b82; margin-bottom: 15px;"></i>
                    <p style="color: #f28b82; font-weight: 600;">Ralat Pelayan Google</p>
                    <p style="font-size: 12px; margin-top: 5px;">${err.message}</p>
                    <button class="btn btn-secondary" style="margin-top: 20px;" onclick="closePdfModal()">Tutup</button>
                `;
            })
            .getStudentPdfId(matric);
    } else {
        setTimeout(() => {
            loading.innerHTML = `
                <i class="fa-solid fa-laptop-code" style="font-size: 48px; color: #94a3b8; margin-bottom: 15px;"></i>
                <p style="color: #94a3b8; font-weight: 600;">Mod Simulasi (Local Preview)</p>
                <p style="font-size: 12px; margin-top: 5px;">Pemapar PDF hanya akan berfungsi sepenuhnya di Google Sites/Apps Script.</p>
                <button class="btn btn-secondary" style="margin-top: 20px;" onclick="closePdfModal()">Tutup</button>
            `;
        }, 1000);
    }
};

window.closePdfModal = () => {
    document.getElementById('pdfModal').style.display = 'none';
    document.getElementById('pdfIframe').src = "";
};

// PELANCARAN SISTEM
render();
checkGoogleIdentity();
fetchDataFromSheet();
</script>
</body>
</html>
